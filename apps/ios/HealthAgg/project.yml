# XcodeGen spec — run `xcodegen generate` in this directory to produce
# HealthAgg.xcodeproj (brew install xcodegen). Requires Xcode 16+ to build.
name: HealthAgg
options:
  bundleIdPrefix: com.lucidspring
  deploymentTarget:
    iOS: "17.0"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
targets:
  HealthAgg:
    type: application
    platform: iOS
    sources: [HealthAgg]
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lucidspring.healthagg
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
    info:
      path: HealthAgg/Info.plist
      properties:
        CFBundleDisplayName: Health Agg
        CFBundleURLTypes:
          - CFBundleURLName: com.lucidspring.healthagg
            CFBundleURLSchemes: [healthagg]
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
